{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Math Challenge{% endblock %}</title>

    <style>
        /* ====== الخصائص العامة للجسم (ثابتة في كل الموقع) ====== */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* استخدام الخلفية التي صممناها */
            background-image: url("{% static 'img/background.png' %}");
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed;

            min-height: 100vh;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            padding: 0px; 
        }

        /* ====== العنوان العلوي الثابت ====== */
        .top-header-title {
            color: #374672; 
            font-size: 3rem; 
            font-weight: 800;
            margin-bottom: 10px; 
            text-align: top;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5); 
        }
        /* ====== BUTTON ====== */
        .btn {
            background: rgb(255, 255, 255);
            color: #2e4472;
            padding: 16px 45px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 23px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        /* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 15px;
    width: 90%;
    max-width: 1100px;
    height: 65px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 30px;
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);

    box-shadow: 0 8px 30px rgba(0,0,0,0.15);

    z-index: 1000;
}

/* logo */
.nav-logo {
    font-size: 22px;
    font-weight: bold;
    color: #1e3a8a;
    letter-spacing: 1px;
}

/* links container */
.nav-links {
    display: flex;
    align-items: center;
}

/* links */
.nav-links a {
    position: relative;
    margin-left: 25px;
    text-decoration: none;
    color: #1e3a8a;
    font-weight: 600;
    font-size: 15px;
    padding: 5px;

    transition: 0.3s;
}

/* underline animation */
.nav-links a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: -2px;
    background: #3b82f6;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

.nav-links a:hover {
    color: #3b82f6;
}

/* active link */
.nav-links a.active {
    color: #2563eb;
}

.nav-links a.active::after {
    width: 100%;
}

.nav-profile {
    display: flex;
    align-items: center;
    margin-left: 15px;
}

.nav-profile img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    cursor: pointer;

    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);

    transition: 0.3s;
}

.nav-profile img:hover {
    transform: scale(1.1);
}

        @media(max-width:850px){
            .top-header-title {
                font-size: 2.2rem;
            }
            .container {
                flex-direction: column-reverse;
                width: 90%;
            }
            .right {
                padding: 30px;
            }
            .left {
                padding: 30px;
            }
        }

    </style>
</head>
<body>
    {% block navbar %}
        <div class="navbar">
            <div class="nav-logo">Math Challenge</div>

            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'levels' %}"class="{% if request.path == '/levels/' %}active{% endif %}">Levels</a>
                <a href="#" class="{% if request.path == '/history/' %}active{% endif %}">History</a>
                {% if user.is_authenticated %}
                    <div class="nav-profile">
                        <a href="#" class="{% if request.path == '/account/' %}active{% endif %}">
                            <img src="{{ user.profile_image.url }}"> 
                        </a>
                    </div>
                {% endif %}
            </div>
        </div>
    {% endblock %}


    {% block content %}

    {% endblock %}
       
</body>
</html>
