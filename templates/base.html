{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Math Challenge{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* ====== الخصائص العامة للجسم (ثابتة في كل الموقع) ====== */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* استخدام الخلفية التي صممناها */
            background-image: url("{% static 'img/background.png' %}");
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed;

            min-height: 100vh;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            padding: 0px; 
        }

        /* ====== العنوان العلوي الثابت ====== */
        .top-header-title {
            color: #374672; 
            font-size: 3rem; 
            font-weight: 800;
            margin-bottom: 10px; 
            text-align: top;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5); 
        }
        /* ====== BUTTON ====== */
        .btn {
            background: rgb(255, 255, 255);
            color: #2e4472;
            padding: 16px 45px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 23px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 15px;
            width: 90%;
            max-width: 1100px;
            height: 65px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 0 30px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);

            box-shadow: 0 8px 30px rgba(0,0,0,0.15);

            z-index: 1000;
        }

        /* logo */
        .nav-logo {
            font-size: 22px;
            font-weight: bold;
            color: #1e3a8a;
            letter-spacing: 1px;
        }

        /* links container */
        .nav-links {
            display: flex;
            align-items: center;
             position: relative;
        }

        /* links */
        .nav-links a {
            position: relative;
            margin-left: 25px;
            text-decoration: none;
            color: #1e3a8a;
            font-weight: 600;
            font-size: 15px;
            padding: 5px;

            transition: 0.3s;
        }

        /* underline animation */
        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            left: 0;
            bottom: -2px;
            background: #3b82f6;
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #3b82f6;
        }

        /* active link */
        .nav-links a.active {
            color: #2563eb;
        }

        .nav-links a.active::after {
            width: 100%;
        }

        .nav-profile {
            display: flex;
            align-items: center;
            margin-left: 15px;
            position: relative;
        }

        .nav-profile img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;

            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);

            transition: 0.3s;
        }

        .nav-profile img:hover {
            transform: scale(1.1);
        }
        .dropdown-menu {
            border-radius: 14px;
            margin-top: 6px !important;
            padding: 6px 0;
            min-width: 200px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            position: absolute;
            top: 100%;
            
            right: -150px !important; 
            
            left: auto !important;
            transform: none !important;
            overflow: hidden;
        }

        /* item */
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 5px;              /* 👈 مسافة بين الأيقونة والنص */
            font-size: 14px;
            padding: 10px 16px;
            color: #333;
            transition: all 0.2s ease;
        }

        /* icon */
        .dropdown-item i {
            font-size: 16px;
            color: #64748b;         /* لون هادي */
        }

        /* hover */
        .dropdown-item:hover {
            background: #f5f8ff;
            color: #1b49ae;
        }

        .dropdown-item:hover i {
            color: #2e57b0;
        }

        /* logout لون مختلف */
        .dropdown-item.logout {
            color: #560c0c;
        }

        .dropdown-item.logout i {
            color: #6c0c0c;
        }

        .dropdown-item.logout:hover {
            background: #ffecec;
            color: #931a1a;
        }
        .dropdown-item.logout:hover i {
            color: #841818;
        }
        .dropdown-item:focus,
        .dropdown-item:active {
            background: #f0f4ff !important;
            color: #1e3a8a !important;
            box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.2) !important; /* ظل أزرق خفيف داخلي */
            outline: none;
        }

        .dropdown-item.logout:focus,
        .dropdown-item.logout:active {
            background: #fff1f2 !important;
            color: #821414 !important;
            box-shadow: inset 0 0 0 2px rgba(220, 38, 38, 0.2) !important; /* ظل أحمر خفيف داخلي */
            border-left: 3px solid #861818;
            outline: none;
        }
        /* divider */
        .dropdown-divider {
            margin: px 0;
        }
        .form-card {
        background: #ffffff; 
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 750px; 
        margin: 10px auto 0 ;
    }
    .form-card h1 {
        color: #1e3a8a;
        font-size: 28px;
        margin-bottom: 5px;
        text-align: center;
    }
    .form p {
        margin-bottom: 3px;
        display: flex;
        flex-direction: column;
    }
    .form label {
        font-size: 15px;
        margin-bottom: 5px;
        color: #4b5563;
        font-weight: 600;

        display: block;
        width: 80%;
        margin: 5px auto 1px; 
        text-align: left;
    }

    .form input {
        display: block;
        width: 80%;
        margin: 0px auto 5px;
        padding: 8px 6px; 
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        background-color: #f9fafb;
        transition: 0.2s;
    }

    .form input:focus {
        outline: none;
        border-color: #3b82f6;
        background-color: #fff;
    }
    .helptext {
        display: none; 
    }
    .form ul {
        display: none;
    }
    .form ul.errorlist {
        display: block;
        color: #971616; 
        list-style: none;
        padding: 0;
        width: 80%;
        margin: 0 auto 5px;
        font-size: 12px;
        font-weight: 500;
        text-align: left;
    }
    .error-message {
        color: rgb(156, 2, 2);
        font-size: 14px;
        margin-top: 10px;
        margin: 0 auto 5px;
        font-weight: 500;
        width: 80%;
    }
    .submit-btn {
        width: 50%;
        background: #24499a;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
        display: block;
        margin: 10px auto;
    }

    .submit-btn:hover {
        background: #4364d1;
        transform: translateY(-2px);
    }

    .login-link {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #6b7280;
    }

    .login-link a {
        color: #3665cb;
        text-decoration: none;
        font-weight: bold;
    }
        @media(max-width:850px){
            .top-header-title {
                font-size: 2.2rem;
            }
            .container {
                flex-direction: column-reverse;
                width: 90%;
            }
            .right {
                padding: 30px;
            }
            .left {
                padding: 30px;
            }
        }
        

    </style>
</head>
<body>
    {% block navbar %}
        <div class="navbar">
            <div class="nav-logo">Math Challenge</div>

            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'levels' %}"class="{% if request.path == '/levels/' %}active{% endif %}">Levels</a>
                <a href="{% url 'history' %}" class="{% if request.path == '/history/' %}active{% endif %}">History</a>
                {% if user.is_authenticated %}
                    <div class="nav-profile dropdown">
                        <img src="{{ user.profile_image.url }}" 
                            class="dropdown-toggle"
                            id="profileMenu"
                            data-bs-toggle="dropdown" 
                            data-bs-display="static"
                            data-bs-offset="0,10"  
                            data-bs-reference="parent"
                            aria-expanded="false">
                        <ul class="dropdown-menu dropdown-menu-end">

                            <li>
                                <a class="dropdown-item" href="{% url 'profile_info' %}">
                                    <i class="bi bi-person"></i>
                                    <span>Profile Info</span>
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item" href="{% url 'change_password' %}">
                                    <i class="bi bi-key"></i>
                                    <span>Change Password</span>
                                </a>
                            </li>

                            <li><hr class="dropdown-divider"></li>

                            <li>
                                <a class="dropdown-item logout" href="{% url 'logout' %}">
                                    <i class="bi bi-box-arrow-right"></i>
                                    <span>Log out</span>
                                </a>
                            </li>

                        </ul>

                    </div>
                {% endif %}
            </div>
        </div>
    {% endblock %}


    {% block content %}

    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
