{% extends 'base.html' %}
{% load static %}

{% block title %}Profile - {{ user.full_name }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center w-100">
        <div class="col-md-8 col-lg-7">

            <div class="card border-0 shadow-lg profile-card">
                <div class="card-body text-center p-4">

                    <!-- الصورة -->
                    <div class="profile-img-container">
                        <img src="{{ user.profile_image.url }}" 
                             alt="{{ user.full_name }}" 
                             class="profile-img">

                        <span class="points-badge">
                            <i class="bi bi-star-fill"></i> {{ user.points }}
                        </span>
                    </div>

                    <!-- الاسم -->
                    <h4 class="mt-3 mb-1">{{ user.full_name }}</h4>

                    <!-- الفورم -->
                    <form method="post" class="form" enctype="multipart/form-data" novalidate>
                        {% csrf_token %}
                        {% include 'includes/form.html' %}

                       <button type="submit" class="btn save-btn w-90 mt-4">
                            Save Changes
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
<style>
    body {
    padding-top: 90px !important;
    justify-content: flex-start !important;
}

/* card */
.profile-card {
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.profile-card:hover {
    transform: translateY(-5px);
}

/* image */
.profile-img-container {
    position: relative;
    display: inline-block;
}

.profile-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

/* points */
.points-badge {
    position: absolute;
    bottom: 0;
    right: 0;
    background: #facc15;
    color: #333;
    padding: 6px 10px;
    border-radius: 20px;
    font-size: 13px;
    border: 2px solid white;
}

/* form */
form input, 
form select {
    border-radius: 10px !important;
    padding: 10px !important;
}

.btn-primary {
    border-radius: 12px;
    padding: 8px;
    font-weight: 600;
}
.save-btn {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 4px 10px;
    font-weight: 600;
    transition: 0.3s;
    width: 60%;
    height: 45px;
    font-size: 20px;
}

.save-btn:hover {
    background: linear-gradient(135deg, #3776ff, #3776ff);
    transform: translateY(-2px);
    color: white;
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
}

</style>
{% endblock %}
