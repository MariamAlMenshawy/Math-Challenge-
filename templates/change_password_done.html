{% extends 'base.html' %}
{% load static %}

{% block title %}Success{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center w-100 m-0">
        <div class="col-md-8 col-lg-6 text-center">
            
            <div class="card border-0 shadow-lg p-5" style="border-radius: 25px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                    </div>
                    
                    <h2 class="fw-bold mb-3" style="color: #1e3a8a;">Password Changed!</h2>
                    <p class="text-muted mb-4 fs-5">Your password has been updated successfully. You can now use your new password to log in next time.</p>
                    
                    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center mt-3">
                        <a href="{% url 'home' %}" class="btn btn-primary btn-lg px-5 shadow-sm btn-home" 
                        style="border-radius: 12px; background-color: #1e3a8a; border: none; font-weight: 600; color: #ffffff !important;">
                            Go to Home
                        </a>

                        <a href="{% url 'profile_info' %}" class="btn btn-outline-primary btn-lg px-5 btn-profile" 
                        style="border-radius: 12px;  color: #ffffff; font-weight: 600; background-color: #768fd5; ">
                            View Profile
                        </a>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>

<style>
    body {
        padding-top: 50px !important;
    }
    .btn-home:hover {
        background-color: #2a4a9e !important; /* تفتيح بسيط عند الهوفر */
        transform: translateY(-4px);
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(30, 58, 138, 0.3) !important;
    }

    .btn-profile:hover {
        background-color: #809ae3 !important; /* يتحول لأزرق كامل عند الهوفر */
        color: #ffffff !important;
        transform: translateY(-4px);
        transition: all 0.3s ease;
    }
</style>
{% endblock %}
