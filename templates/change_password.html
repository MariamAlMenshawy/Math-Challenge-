{% extends 'base.html' %}
{% load widget_tweaks %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container py-5 mt-2">
    <div class="row justify-content-center w-100 m-0">
        <div class="col-md-11 col-lg-9"> 
            
            <div class="card border-0 shadow-lg" style="border-radius: 25px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">
                <div class="card-body px-4 px-md-5 py-4">
                    
                    <h3 class="fw-bold text-center mb-4" style="color: #1e3a8a; font-size: 1.8rem;">Change Password</h3>
                    
                    <form method="post"  class="form" enctype="multipart/form-data" novalidate>
                        {% csrf_token %}
                        {% include 'includes/form.html' %}

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary px-5 py-2 shadow" 
                                    style="border-radius: 15px; font-size: 18px; font-weight: 600; background-color: #1e3a8a; border: none; min-width: 220px; color: #ffffff !important;">
                                <i class="bi bi-check2-circle me-2"></i> Update Password
                            </button>
                        </div>
                    </form>

                </div>
            </div>
            
        </div>
    </div>
</div>

<style>
    body {
        padding-top: 100px !important;
        justify-content: flex-start !important;
        min-height: 100vh;
    }

    /* تنسيق الليبل والحقول */
    .form-group {
        margin-bottom: 12px !important;
    }

    .form-group label {
        font-weight: 600;
        color: #173f78 !important;
        margin-bottom: 5px;
        font-size: 15px;
        display: block;
        text-align: left; /* لضمان بقاء العنوان جهة اليسار فوق الحقل الصغير */
    }
    
    .form-control {
        border-radius: 10px !important;
        padding: 8px 15px !important;
        border: 1px solid #e2e8f0 !important;
        background-color: #f8fafc !important;
        width: 100%; /* سيأخذ 100% من عرض الـ col-md-7 المحيط به */
    }

    .form-control:focus {
        border-color: #1e3a8a !important;
        box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1) !important;
        background-color: #fff !important;
    }
</style>
{% endblock %}
